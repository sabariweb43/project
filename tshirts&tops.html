<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>H&M women Section Clone</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#fff;
      color:#111;
    }

    /* NAVBAR */

    .navbar{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 50px;
      border-bottom:1px solid #eee;
      background:#fff;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .logo{
      font-size:40px;
      font-weight:bold;
      color:#d6001c;
      font-style:italic;
    }

    .nav-links{
      display:flex;
      gap:35px;
    }

    .nav-links a{
      text-decoration:none;
      color:#111;
      font-size:15px;
      font-weight:600;
      transition:.3s;
    }

    .nav-links a:hover{
      color:#d6001c;
    }

    .icons{
      display:flex;
      gap:20px;
      font-size:18px;
      cursor:pointer;
    }

    /* CATEGORY MENU */

    .category-menu{
      display:flex;
      gap:30px;
      overflow-x:auto;
      padding:18px 40px;
      border-bottom:1px solid #eee;
      white-space:nowrap;
    }

    .category-menu a{
      text-decoration:none;
      color:#222;
      font-size:14px;
      font-weight:600;
    }

    .category-menu a:hover{
      color:#d6001c;
    }

    /* PRODUCT COUNT */

    .top-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px;
      color:#555;
      font-size:14px;
    }

    .filter{
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      font-weight:600;
    }

    /* PRODUCTS */

    .products{
      width:100%;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:25px;
      padding:0 40px 50px;
    }

    .card{
      position:relative;
      overflow:hidden;
      transition:.4s;
    }

    .card img{
      width:100%;
      height:500px;
      object-fit:cover;
      background:#f5f5f5;
      transition:.4s;
    }

    .card:hover img{
      transform:scale(1.03);
    }

    .wishlist{
      position:absolute;
      bottom:90px;
      right:15px;
      background:#fff;
      width:35px;
      height:35px;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      box-shadow:0 5px 15px rgba(0,0,0,.1);
      cursor:pointer;
    }

    .details{
      padding-top:15px;
    }

    .title{
      font-size:15px;
      font-weight:600;
      margin-bottom:8px;
    }

    .price{
      font-size:18px;
      font-weight:bold;
    }

    .colors{
      margin-top:10px;
      display:flex;
      gap:8px;
    }

    .color{
      width:14px;
      height:14px;
      border-radius:50%;
      border:1px solid #ccc;
    }

    /* HOVER BUTTON */

    .quick-btn{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:-60px;
      width:85%;
      background:#111;
      color:#fff;
      padding:14px;
      text-align:center;
      font-size:14px;
      transition:.4s;
      cursor:pointer;
    }

    .card:hover .quick-btn{
      bottom:110px;
    }

    /* RESPONSIVE */

    @media(max-width:1100px){

      .products{
        grid-template-columns:repeat(2,1fr);
      }

    }

    @media(max-width:700px){

      .navbar{
        padding:15px 20px;
      }

      .nav-links{
        display:none;
      }

      .products{
        grid-template-columns:1fr;
        padding:0 20px 40px;
      }

      .category-menu{
        padding:15px 20px;
      }

      .top-row{
        padding:20px;
      }

    }

  </style>
</head>

<body>
