<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4 Column Video Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    padding:40px;
}

.video-section{
    max-width:1400px;
    margin:auto;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.video-card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    transition:.3s;
}

.video-card:hover{
    transform:translateY(-5px);
}

.video-card video{
    width:100%;
    display:block;
}

.video-content{
    padding:15px;
}

.video-content h3{
    font-size:18px;
    margin-bottom:8px;
}

.video-content p{
    color:#666;
    font-size:14px;
    line-height:1.5;
}

/* Tablet */
@media(max-width:992px){
.video-grid{
grid-template-columns:repeat(2,1fr);
}
}

/* Mobile */
@media(max-width:600px){
.video-grid{
grid-template-columns:1fr;
}
}
</style>

</head>
<body>

<section class="video-section">

<div class="video-grid">

<div class="video-card">
<video controls poster="poster1.jpg">
<source src="feature0" type="video/mp4">
</video>
<div class="video-content">
<h3>Video Title 1</h3>
<p>Short description goes here.</p>
</div>
</div>

<div class="video-card">
<video controls poster="poster2.jpg">
<source src="feature" type="video/mp4">
</video>
<div class="video-content">
<h3>Video Title 2</h3>
<p>Short description goes here.</p>
</div>
</div>

<div class="video-card">
<video controls poster="poster3.jpg">
<source src="feature1" type="video/mp4">
</video>
<div class="video-content">
<h3>Video Title 3</h3>
<p>Short description goes here.</p>
</div>
</div>

<div class="video-card">
<video controls poster="poster4.jpg">
<source src="feature3" type="video/mp4">
</video>
<div class="video-content">
<h3>Video Title 4</h3>
<p>Short description goes here.</p>
</div>
</div>

</div>

</section>

</body>
</html>
